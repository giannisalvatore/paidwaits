services:
  mysql:
    image: mysql:8
    container_name: waitingads-mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: waitingads
      MYSQL_DATABASE: waitingads
    volumes:
      - waitingads-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pwaitingads"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  waitingads-mysql-data:
